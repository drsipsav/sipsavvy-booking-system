<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SipSavvy Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Admin Styles -->
  <link rel="stylesheet" href="../styles/admin.css">
</head>

<body>

  <header class="admin-header">
    <h1>SipSavvy Admin Dashboard</h1>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </header>

  <section class="filters">
    <button id="filterAll" class="filter-btn">All</button>
    <button id="filterPending" class="filter-btn">Pending</button>
    <button id="filterApproved" class="filter-btn">Approved</button>
    <button id="filterCompleted" class="filter-btn">Completed</button>
  </section>

  <main>
    <div id="bookingContainer" class="booking-container">
      <!-- Booking cards will be injected here by admin.js -->
    </div>
  </main>

  <!-- Firebase Admin Scripts -->
  <script type="module" src="../scripts/admin.js"></script>

</body>
</html>
