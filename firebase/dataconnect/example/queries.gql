mutation CreateClient($data: Client_Data!) @auth(level: USER) {
  client_insert(data: $data)
}

mutation UpsertClient($data: Client_Data!) @auth(level: USER) {
  client_upsert(data: $data)
}

mutation UpdateClient($id: UUID!, $data: Client_Data!) @auth(level: USER) {
  client_update(id: $id, data: $data)
}

mutation DeleteClient($id: UUID!) @auth(level: USER) {
  client_delete(id: $id)
}

query GetClient($id: UUID!) @auth(level: USER) {
  client(id: $id) {
    id
    name
    email
  }
}

query ListClients @auth(level: USER) {
  clients {
    id
    name
  }
}

